<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Presentazione Genially: Fotosintesi">
  <title>Presentazione Fotosintesi</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ef;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      padding: 24px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 2.4vw, 2.2rem);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      background: #eef2f7;
    }

    .embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
      background: #fbfcfe;
    }

    .footer a {
      color: inherit;
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .card { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>Presentazione Fotosintesi</h1>
      <p class="subtitle">Pagina pronta per GitHub Pages con presentazione Genially incorporata.</p>
    </header>

    <section class="card" aria-label="Presentazione Genially">
      <div class="embed">
        <iframe
          title="Presentazione Fotosintesi"
          src="https://view.genially.com/69d1122e09a54ab567c3b3dc"
          type="text/html"
          allowfullscreen
          scrolling="yes"
          allow="fullscreen"
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
      </div>
      <div class="footer">
        Se la presentazione non si carica, aprila direttamente su
        <a href="https://view.genially.com/69d1122e09a54ab567c3b3dc" target="_blank" rel="noopener noreferrer">Genially</a>.
      </div>
    </section>
  </main>
</body>
</html>
